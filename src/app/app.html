      </div>
      <div class="title-box">
        <h1 class="main-title">Roadmaps</h1>
      </div>
    </div>

    <nav class="tabs-row">

      <a routerLink="/ci-cd" routerLinkActive="active" class="tab">CI/CD</a>

  <main class="content-area">

  </main>
